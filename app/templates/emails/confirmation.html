<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email confirmed</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f6f8; margin: 0; padding: 0;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f6f8; padding: 20px;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                    <tr>
                        <td style="background: #1a2a3a; padding: 20px 30px; text-align: center;">
                            <span style="color: #ffffff; font-size: 22px; font-weight: bold;">Blizton</span>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 30px 35px;">
                            <h1 style="font-size: 22px; color: #1a2a3a; margin-top: 0;">Hi {{ user.first_name|default:"there" }},</h1>
                            <p style="line-height: 1.6; color: #555555;">
                                Your email address has been successfully confirmed. You can now log in and start using all the features of Blizton.
                            </p>
                            <div style="text-align: center; margin: 25px 0;">
                                <a href="{{ protocol }}://{{ domain }}/" style="display: inline-block; background: #1a73e8; color: #ffffff !important; text-decoration: none; padding: 12px 28px; border-radius: 6px; font-weight: 600; font-size: 16px;">Go to Dashboard</a>
                            </div>
                            <div style="background: #f0f2f5; padding: 12px 18px; border-radius: 6px; margin-top: 20px; font-size: 14px;">
                                💡 Need help? Contact us at <a href="mailto:support@blizton.com" style="color: #1a73e8;">support@blizton.com</a>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="background: #f8f9fa; padding: 15px 35px; text-align: center; font-size: 12px; color: #888888; border-top: 1px solid #e9ecef;">
                            &copy; 2026 <a href="https://blizton.com" style="color: #1a73e8; text-decoration: none;">Blizton Property Management</a> – All rights reserved.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
