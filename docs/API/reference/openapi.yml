          format: date-time
          readOnly: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        error_log:
          type: string
          readOnly: true
      required:
      - completed_at
      - created_at
      - error_log
      - failed_count
      - id
      - name
      - sent_count
      - status
      - template
      - template_name
      - total_recipients
