    EmailConfiguration:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: e.g., SendGrid, Gmail, etc.
          maxLength: 255
        host:
          type: string
          maxLength: 255
        port:
          type: integer
          maximum: 2147483647
          minimum: 0
        username:
          type: string
          maxLength: 255
        password:
          type: string
          writeOnly: true
          maxLength: 255
        use_tls:
          type: boolean
        use_ssl:
          type: boolean
        from_email:
          type: string
          format: email
          description: Default from email address
          maxLength: 254
        reply_to:
          type: string
          format: email
          nullable: true
          maxLength: 254
        timeout:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_active:
          type: boolean
          description: Only one config can be active at a time
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - from_email
      - host
      - id
      - name
      - updated_at
    GenderEnum:
      enum:
      - male
      - female
      - other
      type: string
      description: |-
        * `male` - Male
        * `female` - Female
        * `other` - Other
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: integer
          nullable: true
        user_email:
          type: string
          format: email
          readOnly: true
        recipient:
          type: string
          format: email
          title: Recipient email
          maxLength: 254
        phone_number:
          type: string
          maxLength: 30
        channel:
          $ref: '#/components/schemas/ChannelEnum'
        subject:
          type: string
          maxLength: 255
        body:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/NotificationStatusEnum'
          readOnly: true
        broadcast:
          type: string
          format: uuid
          nullable: true
        template:
          type: string
          format: uuid
          nullable: true
        error_message:
          type: string
          readOnly: true
        sent_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - body
      - channel
      - created_at
      - error_message
      - id
      - sent_at
      - status
      - user_email
    NotificationStatusEnum:
      enum:
      - pending
      - sent
      - failed
      - canceled
      type: string
      description: |-
        * `pending` - Pending
        * `sent` - Sent
        * `failed` - Failed
        * `canceled` - Canceled
    NotificationTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        type:
          $ref: '#/components/schemas/TypeEnum'
        subject:
          type: string
          maxLength: 255
        template:
          type: string
        html_template:
          type: string
        is_active:
          type: boolean
          title: Active
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - template
      - updated_at
